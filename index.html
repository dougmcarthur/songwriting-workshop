<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A0908">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Songwriting Workshop — Good Sky Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="reveal">
    <div class="slides" id="slides-container"></div>
  </div>

  <div class="float-bar" id="float-bar">
    <button class="float-btn" id="btn-outline">Outline</button>
    <button class="float-btn" id="btn-activity">Activity</button>
    <button class="float-btn float-btn-icon" id="btn-fullscreen" title="Fullscreen · F">⛶</button>
  </div>

  <div class="panel-backdrop" id="panel-backdrop"></div>

  <aside class="side-panel" id="panel-outline" aria-hidden="true">
    <div class="side-panel-head">
      <span class="side-panel-title">Workshop 1 — Song Structure</span>
      <button class="side-panel-close" aria-label="Close">✕</button>
    </div>
    <div class="side-panel-body">
      <div id="outline-body"></div>
    </div>
  </aside>

  <aside class="side-panel" id="panel-activity" aria-hidden="true">
    <div class="side-panel-head">
      <span class="side-panel-title">Build Your Skeleton</span>
      <button class="side-panel-close" aria-label="Close">✕</button>
    </div>
    <div class="side-panel-body">
      <div id="activity-body"></div>
    </div>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4.6.1/dist/reveal.js"></script>
  <script src="app.js"></script>
</body>
</html>
